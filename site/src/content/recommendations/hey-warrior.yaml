title: "Hey Warrior — Karen Young"
summary: >
  A warm, clear picture book that explains anxiety to younger children in terms
  they can actually use — what worry is, why the brain does it, and that it's
  trying (unhelpfully) to keep them safe. We point parents to it in our guide on
  childhood anxiety because it gives children a language for big feelings.
category: book
