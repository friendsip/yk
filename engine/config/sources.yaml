# RSS feeds and web sources to monitor
# PHASE 1: Parenting sources only.

sources:
  # --- TIER 1: Government & Institutional ---
  - name: "NHS - Pregnancy and Baby"
    url: "https://www.nhs.uk/rss/conditions/pregnancy-and-baby.xml"
    type: rss
    category: parenting
    tier: 1
    check_interval: 60
    active: true

  - name: "NHS - Children's Health"
    url: "https://www.nhs.uk/rss/conditions/childrens-health.xml"
    type: rss
    category: parenting
    tier: 1
    check_interval: 60
    active: true

  - name: "GOV.UK - Childcare and Parenting"
    url: "https://www.gov.uk/browse/childcare-parenting.atom"
    type: rss
    category: parenting
    tier: 1
    check_interval: 120
    active: true

  # --- TIER 2: Charities & Professional Bodies ---
  - name: "NSPCC News"
    url: "https://www.nspcc.org.uk/globalassets/feeds/nspcc-news.xml"
    type: rss
    category: parenting
    tier: 2
    check_interval: 120
    active: true

  - name: "Barnardo's News"
    url: "https://www.barnardos.org.uk/rss.xml"
    type: rss
    category: parenting
    tier: 2
    check_interval: 240
    active: true

  - name: "AAP Parenting"
    url: "https://publications.aap.org/aapnews/pages/rss"
    type: rss
    category: parenting
    tier: 2
    check_interval: 120
    filter_keywords: ["parenting", "child development", "family", "behavior", "attachment", "foster"]
    active: true

  # --- TIER 2: International ---
  - name: "Zero to Three (US, early childhood)"
    url: "https://www.zerotothree.org/feed/"
    type: rss
    category: parenting
    tier: 2
    check_interval: 240
    active: true

  - name: "The Conversation - Parenting (international, academic)"
    url: "https://theconversation.com/us/topics/parenting-372/articles.atom"
    type: rss
    category: parenting
    tier: 3
    check_interval: 240
    active: true

  # Feed URL is canonical (declared on their homepage) but the server blocks
  # some non-browser user agents; deactivate if it accumulates failures.
  - name: "Child Mind Institute (US)"
    url: "https://childmind.org/feed/"
    type: rss
    category: parenting
    tier: 2
    check_interval: 240
    filter_keywords: ["parent", "child", "anxiety", "behavior", "development", "school"]
    active: true

  # --- TIER 3: Positive & Solutions Journalism ---
  # Feeds the site's good-news strand: uplifting, evidence-grounded stories
  # about families, children, play, and community. Triage still applies the
  # usual quality bar — feel-good is not an excuse for AI slop or puffery.
  - name: "Positive News (UK)"
    url: "https://www.positive.news/feed/"
    type: rss
    category: parenting
    tier: 3
    check_interval: 240
    filter_keywords: ["child", "children", "family", "families", "parent", "school", "play", "young people"]
    active: true

  - name: "Good News Network"
    url: "https://www.goodnewsnetwork.org/feed/"
    type: rss
    category: parenting
    tier: 3
    check_interval: 240
    filter_keywords: ["child", "children", "family", "families", "parent", "kids", "school"]
    active: true

  - name: "Reasons to be Cheerful"
    url: "https://reasonstobecheerful.world/feed/"
    type: rss
    category: parenting
    tier: 3
    check_interval: 240
    filter_keywords: ["child", "children", "family", "families", "parent", "school", "education", "play"]
    active: true

  # --- TIER 3: Quality Journalism ---
  - name: "Guardian - Family"
    url: "https://www.theguardian.com/lifeandstyle/family/rss"
    type: rss
    category: parenting
    tier: 3
    check_interval: 60
    active: true

  - name: "BBC - Family & Education"
    url: "https://feeds.bbci.co.uk/news/education/rss.xml"
    type: rss
    category: parenting
    tier: 3
    check_interval: 60
    active: true

  # --- PHASE 2+ SOURCES (inactive) ---
  - name: "WHO - Maternal and Child Health"
    url: "https://www.who.int/rss-feeds/news-english.xml"
    type: rss
    category: health
    tier: 1
    check_interval: 120
    filter_keywords: ["child", "infant", "maternal", "paediatric", "pediatric", "vaccination", "nutrition"]
    active: true

  - name: "GOV.UK - Education"
    url: "https://www.gov.uk/search/news-and-communications.atom?topics%5B%5D=education"
    type: rss
    category: education
    tier: 1
    check_interval: 120
    active: false

  - name: "Ofsted News"
    url: "https://www.gov.uk/government/organisations/ofsted.atom"
    type: rss
    category: education
    tier: 1
    check_interval: 240
    active: false

  # Feed currently returns 403 to non-browser clients — re-test before activating.
  - name: "UNICEF UK"
    url: "https://www.unicef.org.uk/feed/"
    type: rss
    category: policy
    tier: 2
    check_interval: 240
    active: false

discovery_searches:
  - query: "therapeutic parenting research 2026"
    frequency: weekly
    category: parenting
    active: true

  - query: "fostering adoption UK guidance"
    frequency: weekly
    category: parenting
    active: true

  - query: "child development parenting guidance international 2026"
    frequency: weekly
    category: parenting
    active: true
