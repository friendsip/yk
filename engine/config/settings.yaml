# Engine scheduling and behaviour settings

scheduling:
  scanner:
    enabled: true
    default_interval_minutes: 60
  triage:
    enabled: true
    interval_minutes: 30
    batch_size: 15
  planner:
    enabled: true
    run_day: "sun"
    run_time: "05:00"
    timezone: "Europe/London"
  writer:
    enabled: true
    run_after: "planner"
  publish:
    enabled: true
    run_day: "sun"
    run_time: "06:00"
    timezone: "Europe/London"
  trend_snapshot:
    enabled: true
    run_day: "sunday"
    run_time: "02:00"
  decay_checker:
    enabled: true
    run_day: "monday"
    run_time: "03:00"
    max_age_days: 90
  bible_reflection:
    enabled: true
    run_after: "publish"

triage:
  min_relevance: 6
  min_importance: 5
  min_reliability: 6
  min_overall_score: 5.5

# Planner bounds — keep the weekly planner prompt (and token bill) finite.
# Without these the candidate pool grows every week until the prompt truncates
# and the plan fails to parse.
planner:
  # Most candidate items handed to the planner in one run (best score first).
  max_candidate_items: 40
  # Triaged items not planned within this many days are marked 'expired' so
  # they leave the candidate pool rather than accumulating forever.
  triaged_item_ttl_days: 21

# Spend guardrails. The cap is deliberately generous: a normal week costs a
# few dollars, so hitting this means something has gone wrong (e.g. a runaway
# retry loop or an unbounded prompt). LLM work is skipped and an alert fires.
limits:
  daily_cost_usd_cap: 20.0

# Operational alerting. Off by default and safe-by-default: a broken alerting
# setup only logs, it never crashes the pipeline it is meant to watch.
#   channel: "email" (SMTP) or "webhook" (Slack/Discord/generic POST)
#   Credentials and the webhook URL come from environment variables, never
#   this file — set the names below and put the secrets in engine/.env.
alerting:
  enabled: false
  channel: "email"
  min_level: "warning"        # info | warning | error — quieter than this only logs
  # Email (SMTP)
  smtp_host: ""
  smtp_port: 587
  smtp_starttls: true
  smtp_user_env: "ALERT_SMTP_USER"
  smtp_password_env: "ALERT_SMTP_PASSWORD"
  from: ""
  to: ""                      # comma-separated for more than one recipient
  # Webhook (Slack / Discord / any JSON POST endpoint)
  webhook_url_env: "ALERT_WEBHOOK_URL"

models:
  scanner: null
  triage: "claude-sonnet-4-6"
  planner: "claude-sonnet-4-6"
  writer: "claude-sonnet-4-6"
  editorial_synthesis: "claude-sonnet-4-6"
  trend_snapshot: "claude-sonnet-4-6"
  decay_checker: "claude-sonnet-4-6"
  bible_reflection: "claude-sonnet-4-6"

publishing:
  mode: "pr"
  max_publishes_per_day: 5
  staging_dir: "engine/staging/"
  git_remote: "origin"
  git_branch: "main"
  pr_branch_prefix: "content/daily-"

# Data maintenance reviewer (decay checker) — register of apps/tools data
# and their authoritative sources lives in config/data_maintenance.yaml
maintenance:
  create_github_issues: true
  min_days_between_issues: 21

trends:
  signal_window_days: 30
  trending_threshold_multiplier: 2.0
  snapshot_frequency: "weekly"
  report_frequency: "monthly"

synthesis:
  min_opposing_sources: 2
  auto_detect: true

site_bible:
  path: "engine/config/site_bible.md"
  max_amendment_proposals_per_day: 3

content:
  min_sources_per_article: 2
  max_word_count: 1500
  min_word_count: 300
  require_source_links: true

# Article photography via the Unsplash API. Off until an app is registered at
# unsplash.com/oauth/applications and UNSPLASH_ACCESS_KEY is set in engine/.env.
# We hotlink the Unsplash CDN (their compliance requirement) and the site
# renders the required "Photo by … on Unsplash" attribution automatically.
# app_name MUST match the registered application name (used in the attribution
# UTM links). skip_tags never get an auto-photo — the gentle illustration
# stays — even if the writer suggests one.
media:
  enabled: false
  provider: "unsplash"
  app_name: "yourkids"
  orientation: "landscape"
  content_filter: "high"      # ask Unsplash to exclude potentially unsafe imagery
  timeout_seconds: 15
  skip_tags:
    - "special-needs"
    - "safeguarding"
    - "bereavement"
    - "mental-health"
